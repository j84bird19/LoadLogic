<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LoadLogic</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  background: #020617;
  color: white;
  font-family: Arial, sans-serif;
  overscroll-behavior: none;
}body.dragging-active { overflow: hidden; touch-action: none; }

.hidden-page { display: none; }

.truck-bed { position: relative; width: 100%; max-width: 680px; height: 300px; background: #1e293b; border: 5px solid #475569; border-radius: 24px; margin: auto; overflow: hidden; }

.wheel { position: absolute; width: 40px; height: 100px; background: #020617; border-radius: 12px; top: 50%; transform: translateY(-50%); }

.wheel.left { left: 10px; }

.wheel.right { right: 10px; }

.item-box { position: absolute; background: #f97316; border: 2px solid white; border-radius: 12px; cursor: grab; touch-action: none; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; font-weight: bold; padding: 4px; user-select: none; overflow: hidden; }

.item-box.selected { outline: 4px solid #facc15; } </style>

</head>
<body class="p-4">
<div class="max-w-5xl mx-auto">
<h1 class="text-3xl font-black text-orange-400 mb-2">LoadLogic</h1>
<p class="text-slate-400 mb-6">Truck Bed Planning Simulator</p><div id="loginPage">
<div class="max-w-md mx-auto bg-slate-900 rounded-3xl p-6 border border-slate-700">
<h2 class="text-2xl font-bold mb-4">Login</h2>
<input id="username" type="text" value="Bird" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 mb-4" />
<button onclick="goToDashboard()" class="w-full bg-orange-500 hover:bg-orange-600 p-3 rounded-xl font-bold">Continue</button>
</div>
</div><div id="dashboardPage" class="hidden-page">
<div class="bg-slate-900 rounded-3xl p-5 border border-slate-700 mb-6">
<h2 class="text-2xl font-bold">Dashboard</h2>
<p class="text-slate-400">No saved projects yet.</p>
</div><button onclick="goToSetup()" class="bg-orange-500 hover:bg-orange-600 px-6 py-3 rounded-xl font-bold mb-6">Start New Project</button>

</div><div id="setupPage" class="hidden-page">
<button onclick="goToDashboard()" class="mb-4 bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl">Back</button><div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
<h2 class="text-3xl font-bold mb-6">New Project Setup</h2><input id="projectName" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 mb-4" value="New Project" />
<input id="truckMake" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 mb-4" value="Ford" />
<input id="truckModel" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 mb-4" value="F-150" /><div class="grid grid-cols-2 gap-4 mb-6">
<button onclick="selectMode('Load')" id="loadModeBtn" class="p-4 rounded-3xl border border-orange-500 bg-orange-500/20">Load Mode</button>
<button onclick="selectMode('Build')" id="buildModeBtn" class="p-4 rounded-3xl border border-slate-700 bg-slate-950">Build Mode</button>
</div><button onclick="launchWorkspace()" class="w-full bg-orange-500 hover:bg-orange-600 p-4 rounded-xl font-bold">Launch Workspace</button>

</div>
</div><div id="workspacePage" class="hidden-page">
<div class="flex flex-wrap gap-3 mb-4">
<button onclick="goToDashboard()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl">Dashboard</button>
<button onclick="openItemForm()" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-xl">Add Item</button>
<button onclick="rotateSelectedItem()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl">Rotate Selected</button>
</div><div class="bg-slate-900 rounded-3xl p-4 border border-slate-700 mb-4">
<h2 id="workspaceTitle" class="text-2xl font-bold mb-1">Workspace</h2>
<p id="workspaceInfo" class="text-slate-400"></p>
</div><div class="grid gap-4">
<div class="bg-slate-900 rounded-3xl p-4 border border-slate-700">
<h3 class="text-xl font-bold mb-3">2D Truck Bed Workspace</h3><div id="truckBed" class="truck-bed">
<div class="wheel left"></div>
<div class="wheel right"></div>
</div>
</div><div class="bg-slate-900 rounded-3xl p-4 border border-slate-700">
<h3 class="text-xl font-bold mb-3">Item Controls</h3><div id="itemForm" class="hidden-page bg-slate-950 p-4 rounded-2xl border border-slate-700 mb-4">
<input id="itemName" class="w-full mb-2 p-2 rounded-lg bg-slate-900 border border-slate-700" placeholder="Item Name" value="Dresser" />
<input id="itemLength" type="number" class="w-full mb-2 p-2 rounded-lg bg-slate-900 border border-slate-700" placeholder="Length" value="60" />
<input id="itemWidth" type="number" class="w-full mb-2 p-2 rounded-lg bg-slate-900 border border-slate-700" placeholder="Width" value="24" />
<input id="itemHeight" type="number" class="w-full mb-2 p-2 rounded-lg bg-slate-900 border border-slate-700" placeholder="Height" value="36" />
<input id="itemWeight" type="number" class="w-full mb-3 p-2 rounded-lg bg-slate-900 border border-slate-700" placeholder="Weight" value="80" /><button onclick="createCustomItem()" class="w-full bg-orange-500 hover:bg-orange-600 p-2 rounded-xl font-bold mb-2">Create Item</button> <button onclick="closeItemForm()" class="w-full bg-slate-700 hover:bg-slate-600 p-2 rounded-xl">Cancel</button>

</div><div id="selectedDetails" class="bg-slate-950 p-4 rounded-2xl text-slate-300 text-sm">
<h4 class="font-bold text-white mb-2">Selected Item</h4>
<p class="text-slate-500">Tap an item to see dimensions here.</p>
</div>
</div>
</div>
</div>
</div><script>
let currentMode = 'Load';
let itemCount = 0;
let selectedItem = null;

function hideAllPages() {
  document.getElementById('loginPage').classList.add('hidden-page');
  document.getElementById('dashboardPage').classList.add('hidden-page');
  document.getElementById('setupPage').classList.add('hidden-page');
  document.getElementById('workspacePage').classList.add('hidden-page');
}

function goToDashboard() {
  hideAllPages();
  document.getElementById('dashboardPage').classList.remove('hidden-page');
}

function goToSetup() {
  hideAllPages();
  document.getElementById('setupPage').classList.remove('hidden-page');
}

function selectMode(mode) {
  currentMode = mode;
}

function launchWorkspace() {
  hideAllPages();
  document.getElementById('workspacePage').classList.remove('hidden-page');

  const projectName = document.getElementById('projectName').value;
  const truckMake = document.getElementById('truckMake').value;
  const truckModel = document.getElementById('truckModel').value;

  document.getElementById('workspaceTitle').innerText = projectName;
  document.getElementById('workspaceInfo').innerText = truckMake + ' ' + truckModel + ' • ' + currentMode + ' Mode';
}

function openItemForm() {
  document.getElementById('itemForm').classList.remove('hidden-page');
}

function closeItemForm() {
  document.getElementById('itemForm').classList.add('hidden-page');
}

function createCustomItem() {
  const name = document.getElementById('itemName').value;
  const length = Number(document.getElementById('itemLength').value);
  const width = Number(document.getElementById('itemWidth').value);
  const height = Number(document.getElementById('itemHeight').value);
  const weight = Number(document.getElementById('itemWeight').value);

  addItemBox(name, length, width, height, weight);
  closeItemForm();
}

function addItemBox(name, length, width, height, weight) {
  const truckBed = document.getElementById('truckBed');
  const item = document.createElement('div');
  item.classList.add('item-box');

  const scale = 1.35;

  item.style.width = Math.max(40, length * scale) + 'px';
  item.style.height = Math.max(30, width * scale) + 'px';
  item.style.left = '80px';
  item.style.top = '80px';

  item.dataset.name = name;
  item.dataset.length = length;
  item.dataset.width = width;
  item.dataset.height = height;
  item.dataset.weight = weight;
  item.dataset.rotated = 'false';

  item.innerHTML = `<div>${name}</div>`;

  item.addEventListener('click', function() {
    selectItem(item);
  });

  truckBed.appendChild(item);
  makeDraggable(item);
}

function selectItem(item) {
  document.querySelectorAll('.item-box').forEach(box => {
    box.classList.remove('selected');
  });

  selectedItem = item;
  item.classList.add('selected');
  updateSelectedDetails();
}

function updateSelectedDetails() {
  const panel = document.getElementById('selectedDetails');

  if (!selectedItem) return;

  panel.innerHTML = `
    <h4 class="font-bold text-white mb-2">${selectedItem.dataset.name}</h4>
    <p><strong>Length:</strong> ${selectedItem.dataset.length}"</p>
    <p><strong>Width:</strong> ${selectedItem.dataset.width}"</p>
    <p><strong>Height:</strong> ${selectedItem.dataset.height}"</p>
    <p><strong>Weight:</strong> ${selectedItem.dataset.weight} lbs</p>
  `;
}

function rotateSelectedItem() {
  if (!selectedItem) {
    alert('Select an item first');
    return;
  }

  const currentWidth = selectedItem.offsetWidth;
  const currentHeight = selectedItem.offsetHeight;

  selectedItem.style.width = currentHeight + 'px';
  selectedItem.style.height = currentWidth + 'px';
}

function makeDraggable(element) {
  let offsetX = 0;
  let offsetY = 0;
  let isDragging = false;

  element.addEventListener('mousedown', startDrag);
  element.addEventListener('touchstart', startDrag);

  function startDrag(e) {
    if (e.cancelable) e.preventDefault();

    document.body.classList.add('dragging-active');
    isDragging = true;

    const rect = element.getBoundingClientRect();

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;

    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag, { passive: false });

    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
  }

  function drag(e) {
    if (!isDragging) return;

    if (e.cancelable) e.preventDefault();

    const truckRect = document.getElementById('truckBed').getBoundingClientRect();

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    let x = clientX - truckRect.left - offsetX;
    let y = clientY - truckRect.top - offsetY;

    x = Math.max(0, Math.min(x, truckRect.width - element.offsetWidth));
    y = Math.max(0, Math.min(y, truckRect.height - element.offsetHeight));

    element.style.left = x + 'px';
    element.style.top = y + 'px';
  }

  function stopDrag() {
    document.body.classList.remove('dragging-active');
    isDragging = false;

    document.removeEventListener('mousemove', drag);
    document.removeEventListener('touchmove', drag);
  }
}
</script></body>
</html>
