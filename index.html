<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoadLogic</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
    background:#020617;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:12px;
}
.panel{
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:20px;
    padding:14px;
    margin-bottom:14px;
}
.truck-bed{
    position:relative;
    width:100%;
    max-width:430px;
    height:420px;
    background:#1e293b;
    border:5px solid #475569;
    border-radius:22px;
    margin:auto;
    overflow:hidden;
}
.wheel{
    position:absolute;
    width:24px;
    height:70px;
    background:#020617;
    border-radius:20px;
    top:160px;
}
.wheel.left{left:8px;}
.wheel.right{right:8px;}
.item-box{
    position:absolute;
    background:#f97316;
    border:2px solid white;
    border-radius:12px;
    color:white;
    font-size:12px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:4px;
    cursor:grab;
    touch-action:none;
}
.valid-placement{
    outline:3px solid #22c55e;
}
.invalid-placement{
    outline:3px solid #ef4444;
}
.small-btn{
    background:#334155;
    padding:10px;
    border-radius:10px;
    font-size:13px;
}
.small-btn:hover{
    background:#475569;
}
input{
    color:white;
}
</style>
</head>
<body>

<h1 class="text-3xl font-bold text-orange-400">LoadLogic</h1>
<p class="text-slate-400 mb-3">Truck Bed Planning Simulator</p>

<div class="flex gap-2 mb-3 flex-wrap">
<button onclick="openItemForm()" class="bg-orange-500 px-3 py-2 rounded-xl">Add Item</button>
<button onclick="rotateSelectedItem()" class="bg-slate-700 px-3 py-2 rounded-xl">Rotate</button>
<button onclick="saveProject()" class="bg-green-600 px-3 py-2 rounded-xl">Save Project</button>
</div>

<div class="panel">
<h2 class="font-bold text-xl mb-3">Truck Bed / Bird's-Eye View</h2>

<div id="truckBed" class="truck-bed">
<div class="wheel left"></div>
<div class="wheel right"></div>
</div>
</div>

<div class="panel">
<h3 class="font-bold text-lg mb-2">Selected Item Controls</h3>
<p id="selectedInfo" class="text-slate-400 mb-3">Tap an item to edit it.</p>

<div class="grid grid-cols-2 gap-2">
<button onclick="rotateSelectedItem()" class="small-btn">Rotate 90°</button>
<button onclick="editSelectedItem()" class="small-btn">Edit Size</button>
<button onclick="deleteSelectedItem()" class="small-btn bg-red-800">Delete</button>
</div>
</div>

<div class="panel">
<h3 class="font-bold text-lg mb-2">Staging Area</h3>

<div id="itemForm" style="display:none;">
<input id="itemName" class="w-full p-2 rounded-lg bg-slate-900 border border-slate-700 mb-2" placeholder="Item Name" value="Furniture">
<input id="itemLength" type="number" class="w-full p-2 rounded-lg bg-slate-900 border border-slate-700 mb-2" placeholder="Length" value="60">
<input id="itemWidth" type="number" class="w-full p-2 rounded-lg bg-slate-900 border border-slate-700 mb-2" placeholder="Width" value="24">
<input id="itemHeight" type="number" class="w-full p-2 rounded-lg bg-slate-900 border border-slate-700 mb-2" placeholder="Height" value="36">

<button onclick="createItem()" class="w-full bg-orange-500 p-2 rounded-xl">Create Item</button>
</div>

<div id="stagingArea" class="mt-3 text-slate-400">
Tap Add Item to create an object.
</div>
</div>

<script>
let selectedItem = null;
const scale = 2;

function openItemForm(){
    document.getElementById('itemForm').style.display='block';
}

function createItem(){
    const item={
        name:document.getElementById('itemName').value,
        length:Number(document.getElementById('itemLength').value),
        width:Number(document.getElementById('itemWidth').value),
        height:Number(document.getElementById('itemHeight').value),
        x:80,
        y:80,
        rotated:false
    };

    addItemBox(item);
}

function addItemBox(data){
    const item=document.createElement('div');
    item.className='item-box';

    item.dataset.name=data.name;
    item.dataset.length=data.length;
    item.dataset.width=data.width;
    item.dataset.height=data.height;
    item.dataset.rotated=data.rotated;

    updateItemSize(item);

    item.style.left=data.x+'px';
    item.style.top=data.y+'px';

    item.innerHTML=data.name;

    item.addEventListener('pointerdown',(e)=>{
        selectItem(item);
        startDrag(e,item);
    });

    document.getElementById('truckBed').appendChild(item);
}

function updateItemSize(item){
    let length=Number(item.dataset.length);
    let width=Number(item.dataset.width);

    if(item.dataset.rotated==='true'){
        [length,width]=[width,length];
    }

    item.style.width=(length/scale)+'px';
    item.style.height=(width/scale)+'px';
}

function selectItem(item){
    selectedItem=item;

    document.getElementById('selectedInfo').innerHTML=`
        <strong>${item.dataset.name}</strong><br>
        ${item.dataset.length}" × ${item.dataset.width}" × ${item.dataset.height}"
    `;
}

function rotateSelectedItem(){
    if(!selectedItem)return;

    selectedItem.dataset.rotated=selectedItem.dataset.rotated==='true'?'false':'true';
    updateItemSize(selectedItem);
}

function editSelectedItem(){
    if(!selectedItem)return;

    const length=prompt('Length',selectedItem.dataset.length);
    const width=prompt('Width',selectedItem.dataset.width);
    const height=prompt('Height',selectedItem.dataset.height);

    if(length)selectedItem.dataset.length=length;
    if(width)selectedItem.dataset.width=width;
    if(height)selectedItem.dataset.height=height;

    updateItemSize(selectedItem);
    selectItem(selectedItem);
}

function deleteSelectedItem(){
    if(!selectedItem)return;

    selectedItem.remove();
    selectedItem=null;
    document.getElementById('selectedInfo').innerHTML='Tap an item to edit it.';
}

function startDrag(e,item){
    e.preventDefault();

    const truck=document.getElementById('truckBed');
    const truckRect=truck.getBoundingClientRect();

    const rect=item.getBoundingClientRect();
    const offsetX=e.clientX-rect.left;
    const offsetY=e.clientY-rect.top;

    function move(ev){
        let x=ev.clientX-truckRect.left-offsetX;
        let y=ev.clientY-truckRect.top-offsetY;

        item.style.left=x+'px';
        item.style.top=y+'px';

        if(validPlacement(item,x,y)){
            item.classList.add('valid-placement');
            item.classList.remove('invalid-placement');
        }else{
            item.classList.add('invalid-placement');
            item.classList.remove('valid-placement');
        }
    }

    function up(){
        item.classList.remove('valid-placement');
        item.classList.remove('invalid-placement');

        document.removeEventListener('pointermove',move);
        document.removeEventListener('pointerup',up);
    }

    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
}

function validPlacement(item,x,y){
    const truck=document.getElementById('truckBed');

    if(x<0||y<0)return false;
    if(x+item.offsetWidth>truck.clientWidth)return false;
    if(y+item.offsetHeight>truck.clientHeight)return false;

    return true;
}

function saveProject(){
    alert('Project save system placeholder.');
}
</script>

</body>
</html>
